name: blueprint 1
version: v15
formatVersion: 1
inputs:
  supervisornamespace-name:
    type: string
  storageClass:
    type: string
resources:
  CCI_Supervisor_Namespace_1:
    type: CCI.Supervisor.Namespace
    properties:
      name: ${input.supervisornamespace-name}
      existing: true
  Virtual_Machine_1:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.CCI_Supervisor_Namespace_1.id}
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachine
        metadata:
          name: virtual-machine-1-${env.shortDeploymentId}
        spec:
          imageName: vmi-05cbf8426e8dc91ed
          className: best-effort-xsmall
          powerState: PoweredOff
          storageClass: ${input.storageClass}
